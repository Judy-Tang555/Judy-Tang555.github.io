<!DOCTYPE html>
<html lang="zh-cn">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <title>BMTD的博客</title>
        <link rel="stylesheet" href="assets/theme.css">
        <style>
                *{box-sizing:border-box}
                body{font-family:Segoe UI,Arial,Helvetica,sans-serif;margin:0}
                .wrap{max-width:1000px;margin:0 auto;padding:40px 20px}
                .hero{display:flex;gap:24px;align-items:center;padding:28px;border-radius:12px;background:linear-gradient(90deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));box-shadow:0 6px 24px rgba(2,6,23,0.12)}
                .avatar{width:120px;height:120px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#7bd389);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--text);font-size:28px}
                .hero .meta h1{margin:0 0 8px 0;font-size:28px}
                .hero .meta p{margin:0;color:var(--muted)}
                .buttons{margin-top:12px;display:flex;gap:10px}
                .btn{display:inline-block;padding:10px 14px;border-radius:8px;text-decoration:none;font-weight:600}
                .btn.primary{background:linear-gradient(90deg,var(--accent),#7bd389);color:var(--text)}
                .btn.ghost{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--muted)}
                .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:22px}
                .block{background:var(--card);padding:18px;border-radius:12px}
                .block h3{margin:0 0 8px 0}
                .theme-toggle{position:fixed;right:12px;top:12px;padding:8px;border-radius:999px;border:0;background:var(--card);color:var(--text);cursor:pointer;box-shadow:0 6px 18px rgba(2,6,23,0.08)}
                @media (max-width:640px){.hero{flex-direction:column;align-items:flex-start}.avatar{width:96px;height:96px}}
        </style>
</head>
<body>
        <button id="theme-toggle" class="theme-toggle" title="日/夜模式切换">🌙</button>
    <div class="wrap">
        <section class="hero">
            <div class="avatar">BMTD</div>
            <div class="meta">
                <h1>BMTD 的博客</h1>
                <p class="small">记录学习与日常的小想法 — 简洁、易用、离线可用。</p>
                <div class="buttons">
                    <a class="btn ghost" href="favorites.html">🔖 收藏网站</a>
                </div>
            </div>
        </section>

        <section class="grid" aria-label="主要模块">
            <a class="block" href="study.html"><h3>学习</h3><p class="small">笔记、教程与课程</p></a>
            <a class="block" href="ai.html"><h3>人工智能</h3><p class="small">AI 相关实验与笔记</p></a>
            <a class="block" href="projects.html"><h3>项目</h3><p class="small">我的代码与演示</p></a>
            <a class="block" href="favorites.html"><h3>收藏网站</h3><p class="small">常用链接与在线工具</p></a>
        </section>
    </div>
    <script src="assets/theme.js"></script>
</body>
</html>

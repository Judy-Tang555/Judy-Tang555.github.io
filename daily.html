<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>每日记录</title>
  <link rel="stylesheet" href="assets/daily.css">
</head>
<body>
  <main class="container">
    <header>
      <h1>每日记录</h1>
      <p class="subtitle">用本地存储保存你的每日笔记（离线可用）</p>
    </header>

    <section class="editor">
      <label>日期 <input id="entry-date" type="date"></label>
      <label>标题 <input id="entry-title" type="text" placeholder="记录标题"></label>
      <label>内容 <textarea id="entry-content" rows="6" placeholder="写下今天的事情..."></textarea></label>
      <div class="actions">
        <button id="save-btn">保存</button>
        <button id="cancel-btn" class="muted">取消</button>
      </div>
    </section>

    <section class="controls">
      <input id="filter-date" type="date">
      <button id="filter-btn">筛选</button>
      <button id="clear-filter" class="muted">清除筛选</button>
      <div class="right">
        <button id="export-btn">导出 JSON</button>
        <button id="clear-all" class="danger">清空全部</button>
      </div>
    </section>

    <section>
      <ul id="entries-list" class="list"></ul>
    </section>
  </main>
  <script src="assets/daily.js"></script>
</body>
</html>

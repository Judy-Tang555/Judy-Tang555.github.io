<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>项目学习 — 我的博客</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;background:#f0f2f5;min-height:100vh;padding:40px 20px 60px;color:#2d2d2d}
        .page{max-width:680px;margin:0 auto;display:flex;flex-direction:column;gap:20px}
        .header{background:linear-gradient(135deg,#11998e,#38ef7d);border-radius:20px;padding:28px 32px;display:flex;align-items:center;gap:16px;box-shadow:0 6px 24px rgba(0,0,0,0.12)}
        .back{text-decoration:none;color:#fff;font-size:22px;opacity:0.85;transition:opacity .15s}.back:hover{opacity:1}
        .header-icon{font-size:32px}
        .header h1{font-size:1.4rem;font-weight:700;color:#fff}
        .content{background:#fff;border-radius:20px;padding:32px;box-shadow:0 4px 20px rgba(0,0,0,0.07);min-height:200px;display:flex;align-items:center;justify-content:center}
        .placeholder{text-align:center;color:#bbb;font-size:0.95rem;line-height:2}
    </style>
</head>
<body>
    <div class="page">
        <div class="header">
            <a class="back" href="index.html">‹</a>
            <span class="header-icon">📚</span>
            <h1>项目学习</h1>
        </div>
        <div class="content">
            <div class="placeholder">
                <div style="font-size:40px;margin-bottom:12px">🚧</div>
                内容建设中，敬请期待~~~
            </div>
        </div>
    </div>
</body>
</html>
